name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      PAGES_ADMIN_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or update Pages site
        if: ${{ env.PAGES_ADMIN_TOKEN != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ env.PAGES_ADMIN_TOKEN }}
          script: |
            const headers = {
              'X-GitHub-Api-Version': '2026-03-10',
            };
            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              headers,
            };

            try {
              const { data } = await github.request(
                'GET /repos/{owner}/{repo}/pages',
                params,
              );

              if (data.build_type !== 'workflow') {
                await github.request('PUT /repos/{owner}/{repo}/pages', {
                  ...params,
                  build_type: 'workflow',
                });
                core.info('GitHub Pages source changed to GitHub Actions workflow.');
              } else {
                core.info('GitHub Pages already uses GitHub Actions workflow.');
              }
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.request('POST /repos/{owner}/{repo}/pages', {
                ...params,
                build_type: 'workflow',
              });
              core.info('GitHub Pages site created with workflow build type.');
            }

      - name: Verify Pages is enabled
        if: ${{ env.PAGES_ADMIN_TOKEN == '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const headers = {
              'X-GitHub-Api-Version': '2026-03-10',
            };

            try {
              await github.request('GET /repos/{owner}/{repo}/pages', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                headers,
              });
              core.info('GitHub Pages is already enabled.');
            } catch (error) {
              if (error.status === 404) {
                core.setFailed(
                  'GitHub Pages is not enabled. Add a repository secret named PAGES_ADMIN_TOKEN with Pages write and Administration write permissions, then rerun this workflow.',
                );
                return;
              }

              throw error;
            }

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
